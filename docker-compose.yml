services:
  mysql:
    image: mysql:8.4
    container_name: finwise-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: finwise
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - finwise-mysql-data:/var/lib/mysql
volumes:
  finwise-mysql-data: