spring.application.name=finwise

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:finwise}?sslMode=PREFERRED&serverTimezone=UTC
spring.datasource.username=${DB_USER:finwise}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration

finwise.jwt.secret=${JWT_SECRET}
finwise.jwt.expiration=${JWT_EXPIRATION:3600000}
finwise.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

server.port=${PORT:8080}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false