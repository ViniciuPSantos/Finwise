finwise.jwt.secret=test-secret-key-with-at-least-32-characters-long-1234567890
finwise.jwt.expiration=3600000
finwise.jwt.refresh-expiration=604800000

# Banco H2 em memória para testes (não usa o MySQL/Docker)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect